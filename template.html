<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {{title}}
  </title>
</head>

<body>
  <h1>{{title}}</h1>
  {{#if default_body}}
  <p>This is the default body</p>
  {{:else}}
  <p>
    {{body}}
    {{#if show_footer}}
    <footer>
      <p>This is the footer</p>
    </footer>
    {{/if}}
  </p>
  {{/if}}
</body>

</html>
